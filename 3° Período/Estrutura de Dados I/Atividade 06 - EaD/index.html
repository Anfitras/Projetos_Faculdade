<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fila em JavaScript</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
    <script src="model/Atendimento.js"></script>
    <script src="model/Fila.js"></script>
    <script src="controller/filaController.js"></script>
  </head>
  <body>
    <div class="container">
      <div class="jumbotron bg-success text-light text-center py-3">
        <h1 class="display-4">
          <i class="fas fa-headset"></i> Sistema de Controle de Atendimento
        </h1>
      </div>
      <div
        id="mensagem-remocao"
        class="alert alert-success mt-3"
        style="display: block"
      ></div>
      <h2>Fila</h2>
      <p>Adicione pessoas na fila:</p>
      <div class="form-group">
        <label for="novoNome">Nome:</label>
        <br />
        <input
          type="text"
          class="form-control"
          id="txtnovoNome"
          placeholder="Digite o nome"
        />
        <label for="txtCpf" class="mt-2">CPF:</label>
        <input
          type="text"
          class="form-control"
          id="txtCpf"
          placeholder="Digite o CPF"
        />
        <br />
        <button class="btn btn-primary" onclick="adicionarElemento()">
          Adicionar à fila
        </button>
        <button class="btn btn-success" onclick="removerElemento()">
          Atender
        </button>
        <button class="btn btn-warning" onclick="buscarElemento()">
          Buscar
        </button>
        <br />
        <br />
      </div>
      <section class="card shadow-sm border-0 mt-4">
        <div
          class="card-header bg-light d-flex justify-content-between align-items-center"
        >
          <h2 id="lblPessoasFila" class="h4 mb-0">Dados da Fila</h2>
          <span class="badge text-bg-success">Atendimentos</span>
        </div>
        <div id="filaCardBody" class="card-body p-0 d-none">
          <div class="table-responsive">
            <table class="table table-striped table-hover mb-0 align-middle">
              <thead class="table-success">
                <tr>
                  <th>Nome</th>
                  <th>CPF</th>
                  <th>Data</th>
                  <th>Hora</th>
                </tr>
              </thead>
              <tbody id="listFila"></tbody>
            </table>
          </div>
        </div>
      </section>
      <footer class="footer bg-success text-light text-center mt-5 py-3">
        <div class="container text-center">
          <span class="text-light"
            >Desenvolvido por IFSULDEMINAS - Campus Machado
            <i class="fas fa-heart"></i
          ></span>
        </div>
      </footer>
    </div>
  </body>
</html>
