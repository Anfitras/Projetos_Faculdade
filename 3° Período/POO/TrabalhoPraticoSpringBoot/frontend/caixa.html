<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Frente de Caixa - Armazém</title>
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/caixa.css" />
  </head>
  <body>
    <nav>
      <ul>
        <li><a href="index.html">Dashboard</a></li>
        <li><a href="produtos.html">Produtos</a></li>
        <li><a href="fornecedores.html">Fornecedores</a></li>
        <li><a href="clientes.html">Clientes</a></li>
        <li><a href="movimentacoes.html">Movimentações</a></li>
        <li><a href="caixa.html">Caixa</a></li>
        <li><a href="vendas.html">Histórico de Vendas</a></li>
      </ul>
    </nav>

    <main class="caixa-container">
      <section class="form-card">
        <h2>Adicionar Item</h2>
        <form id="formAdicionarItem">
          <div class="form-grid">
            <select id="produtoCaixa" required>
              <option value="">Selecione um Produto</option>
            </select>
            <input
              type="number"
              id="quantidadeCaixa"
              placeholder="Quantidade"
              required
              min="1"
            />
          </div>
          <button type="submit" class="btn-primary full-width">
            Adicionar ao Carrinho
          </button>
        </form>
      </section>

      <section>
        <h2>Carrinho de Compras</h2>
        <table id="tabelaCarrinho">
          <thead>
            <tr>
              <th>Produto</th>
              <th>Qtd</th>
              <th>Preço Un.</th>
              <th>Subtotal</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </section>

      <section class="summary-card">
        <h3>Resumo da Venda</h3>
        <p class="total-bruto">
          Total Bruto: R$ <span id="totalBruto">0.00</span>
        </p>

        <div class="checkout-grid">
          <div class="cliente-wrapper">
            <select id="clienteCaixa">
              <option value="">Consumidor Final (Sem CPF)</option>
            </select>
            <button type="button" id="btnAbrirModalCliente" class="btn-warning">
              + Novo
            </button>
          </div>
          <input
            type="number"
            id="descontoCaixa"
            placeholder="Desconto (R$)"
            min="0"
            step="0.01"
          />
          <select id="formaPagamentoCaixa" required>
            <option value="DINHEIRO">Dinheiro</option>
            <option value="CARTAO_DEBITO">Cartão de Débito</option>
            <option value="CARTAO_CREDITO">Cartão de Crédito</option>
            <option value="PIX">PIX</option>
          </select>
          <button id="btnFinalizarVenda" class="btn-success full-width">
            Finalizar Venda
          </button>
        </div>
      </section>
    </main>

    <dialog id="modalNovoCliente" class="modal-dialog">
      <div class="modal-content">
        <h3>Cadastrar Novo Cliente</h3>
        <form id="formModalCliente">
          <div class="form-group">
            <input
              type="text"
              id="modalNomeCliente"
              placeholder="Nome Completo"
              required
            />
          </div>
          <div class="form-group">
            <input
              type="text"
              id="modalCpfCliente"
              placeholder="CPF"
              required
            />
          </div>
          <div class="form-group">
            <input
              type="text"
              id="modalTelefoneCliente"
              placeholder="Telefone"
            />
          </div>
          <div class="form-group">
            <input type="email" id="modalEmailCliente" placeholder="E-mail" />
          </div>
          <div class="modal-actions">
            <button type="button" id="btnFecharModal" class="btn-danger">
              Cancelar
            </button>
            <button type="submit" class="btn-success">Salvar</button>
          </div>
        </form>
      </div>
    </dialog>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/validators.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/nav.js"></script>
    <script src="js/authGuard.js"></script>
    <script src="js/caixa.js"></script>
  </body>
</html>
