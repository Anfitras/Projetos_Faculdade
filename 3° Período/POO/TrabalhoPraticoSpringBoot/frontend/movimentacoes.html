<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Movimentação de Estoque</title>
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/movimentacoes.css" />
  </head>
  <body>
    <nav>
      <ul>
        <li><a href="index.html">Dashboard</a></li>
        <li><a href="produtos.html">Produtos</a></li>
        <li><a href="fornecedores.html">Fornecedores</a></li>
        <li><a href="clientes.html">Clientes</a></li>
        <li><a href="movimentacoes.html">Movimentações</a></li>
        <li><a href="caixa.html">Caixa</a></li>
        <li><a href="vendas.html">Histórico de Vendas</a></li>
      </ul>
    </nav>

    <main class="movimentacoes-container">
      <section class="form-card">
        <h2>Registrar Movimentação</h2>
        <form id="formMovimento">
          <div class="form-grid">
            <select id="produtoMovimento" class="full-width" required>
              <option value="">Selecione um Produto</option>
            </select>

            <select id="tipoMovimento" required>
              <option value="ENTRADA">Entrada</option>
              <option value="SAIDA">Saída</option>
            </select>

            <input
              type="number"
              id="quantidadeMovimento"
              placeholder="Quantidade"
              required
              min="1"
            />

            <input
              type="text"
              id="loteMovimento"
              placeholder="Lote da Remessa"
            />

            <input type="date" id="validadeMovimento" />

            <input
              type="text"
              id="observacaoMovimento"
              class="full-width"
              placeholder="Observação (Ex: Ajuste de estoque, Compra, Perda)"
            />
          </div>
          <button type="submit" class="btn-primary">
            Registrar Movimentação
          </button>
        </form>
      </section>

      <section>
        <h2>Histórico de Movimentações</h2>
        <table id="tabelaMovimentos">
          <thead>
            <tr>
              <th>ID</th>
              <th>Produto</th>
              <th>Tipo</th>
              <th>Qtd</th>
              <th>Lote</th>
              <th>Validade</th>
              <th>Data Registro</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </section>
    </main>

    <script src="js/movimentacoes.js"></script>
    <script src="js/authGuard.js"></script>
  </body>
</html>
