<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clientes - Armazém</title>
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/fornecedores.css" />
  </head>
  <body>
    <nav>
      <ul>
        <li><a href="index.html">Dashboard</a></li>
        <li><a href="produtos.html">Produtos</a></li>
        <li><a href="fornecedores.html">Fornecedores</a></li>
        <li><a href="clientes.html">Clientes</a></li>
        <li><a href="movimentacoes.html">Movimentações</a></li>
        <li><a href="caixa.html">Caixa</a></li>
        <li><a href="vendas.html">Histórico de Vendas</a></li>
      </ul>
    </nav>
    <main class="fornecedores-container">
      <section class="form-card">
        <h2>Cadastro de Cliente</h2>
        <form id="formCliente">
          <div class="form-grid">
            <input
              type="text"
              id="nomeCliente"
              class="span-2"
              placeholder="Nome do Cliente"
              required
            />
            <input type="text" id="cpfCliente" placeholder="CPF" required />
            <input type="text" id="telefoneCliente" placeholder="Telefone" />
            <input
              type="email"
              id="emailCliente"
              class="span-2"
              placeholder="E-mail"
            />
          </div>
          <button type="submit" class="btn-primary">Salvar Cliente</button>
        </form>
      </section>
      <section>
        <h2>Clientes Cadastrados</h2>
        <table id="tabelaClientes">
          <thead>
            <tr>
              <th>ID</th>
              <th>Nome</th>
              <th>CPF</th>
              <th>Telefone</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </section>
    </main>
    <script src="js/clientes.js"></script>
    <script src="js/authGuard.js"></script>
  </body>
</html>
