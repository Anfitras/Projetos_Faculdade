    <main class="fornecedores-container">
      <section class="form-card">
        <h2>Cadastro de Fornecedor</h2>
        <form id="formFornecedor">
          <div class="form-grid">
            <input
              type="text"
              id="nomeFornecedor"
              class="span-2"
              placeholder="Nome do Fornecedor"
              required
            />
            <input
              type="text"
              id="cnpjFornecedor"
              placeholder="CNPJ"
              required
            />
            <input type="text" id="telefoneFornecedor" placeholder="Telefone" />
            <input
              type="email"
              id="emailFornecedor"
              class="span-2"
              placeholder="E-mail"
            />
            <input
              type="text"
              id="enderecoFornecedor"
              class="full-width"
              placeholder="Endereço"
            />
          </div>
          <button type="submit" class="btn-primary">Salvar Fornecedor</button>
        </form>
      </section>
      <section>
        <h2>Fornecedores Cadastrados</h2>
        <table id="tabelaFornecedores">
          <thead>
            <tr>
              <th>ID</th>
              <th>Nome</th>
              <th>CNPJ</th>
              <th>Telefone</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </section>
    </main>
    <script src="js/fornecedores.js"></script>
    <script src="js/authGuard.js"></script>
  </body>
</html>
