<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Produtos - Armazém</title>
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/produtos.css" />
  </head>
  <body>
    <nav>
      <ul>
        <li><a href="index.html">Dashboard</a></li>
        <li><a href="produtos.html">Produtos</a></li>
        <li><a href="fornecedores.html">Fornecedores</a></li>
        <li><a href="clientes.html">Clientes</a></li>
        <li><a href="movimentacoes.html">Movimentações</a></li>
        <li><a href="caixa.html">Caixa</a></li>
        <li><a href="vendas.html">Histórico de Vendas</a></li>
      </ul>
    </nav>
    <main class="produtos-container">
      <section class="form-card">
        <h2>Cadastrar Produto</h2>
        <form id="formProduto">
          <div class="form-grid">
            <input
              type="text"
              id="nomeProduto"
              placeholder="Nome do Produto"
              required
            />
            <input
              type="text"
              id="categoriaProduto"
              placeholder="Categoria"
              required
            />
            <input
              type="number"
              id="precoCustoProduto"
              placeholder="Preço de Custo"
              step="0.01"
              required
            />
            <input
              type="number"
              id="precoVendaProduto"
              placeholder="Preço de Venda"
              step="0.01"
              required
            />
            <select id="fornecedorSelect" class="full-width" required>
              <option value="">Carregando fornecedores...</option>
            </select>
          </div>
          <button type="submit" class="btn-primary">Salvar Produto</button>
        </form>
      </section>
      <section>
        <h2>Produtos em Estoque</h2>
        <table id="tabelaProdutos">
          <thead>
            <tr>
              <th>ID</th>
              <th>Nome</th>
              <th>Categoria</th>
              <th>Custo</th>
              <th>Venda</th>
              <th>Estoque</th>
              <th>Fornecedor</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </section>
    </main>
    <script src="js/produtos.js"></script>
    <script src="js/authGuard.js"></script>
  </body>
</html>
