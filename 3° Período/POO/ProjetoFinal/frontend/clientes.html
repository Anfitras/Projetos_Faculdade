<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clientes - Armazém</title>
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/clientes.css" />
  </head>
  <body>
    <div class="container">
      <nav class="navbar">
        <div class="navbar-brand">
          <h1>Armazém</h1>
        </div>
        <ul class="navbar-menu">
          <li><a href="index.html">Dashboard</a></li>
          <li><a href="produtos.html">Produtos</a></li>
          <li><a href="fornecedores.html">Fornecedores</a></li>
          <li><a href="clientes.html" class="active">Clientes</a></li>
          <li><a href="movimentacoes.html">Movimentações</a></li>
          <li><a href="caixa.html">Caixa</a></li>
          <li><a href="vendas.html">Histórico de Vendas</a></li>
        </ul>
      </nav>

      <main class="main-content">
        <div class="page-header">
          <h2>Gestão de Clientes</h2>
        </div>

        <div class="card" style="margin-bottom: 30px">
          <h3 style="margin-bottom: 20px">Cadastrar / Editar Cliente</h3>
          <form id="formCliente">
            <div
              style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px"
            >
              <div class="form-group">
                <label for="nomeCliente">Nome Completo</label>
                <input
                  type="text"
                  id="nomeCliente"
                  placeholder="Nome do Cliente"
                  required
                />
              </div>
              <div class="form-group">
                <label for="cpfCliente">CPF</label>
                <input
                  type="text"
                  id="cpfCliente"
                  placeholder="000.000.000-00"
                  required
                />
              </div>
            </div>

            <div
              style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px"
            >
              <div class="form-group">
                <label for="telefoneCliente">Telefone</label>
                <input
                  type="text"
                  id="telefoneCliente"
                  placeholder="(00) 00000-0000"
                />
              </div>
              <div class="form-group">
                <label for="emailCliente">E-mail</label>
                <input
                  type="email"
                  id="emailCliente"
                  placeholder="cliente@email.com"
                />
              </div>
            </div>

            <button type="submit" class="btn btn-primary">
              Salvar Cliente
            </button>
          </form>
        </div>

        <div class="table-container">
          <table id="tabelaClientes" class="table">
            <thead>
              <tr>
                <th>ID</th>
                <th>Nome</th>
                <th>CPF</th>
                <th>Telefone</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </main>
    </div>

    <script src="js/clientes.js"></script>
    <script src="js/authGuard.js"></script>
  </body>
</html>
