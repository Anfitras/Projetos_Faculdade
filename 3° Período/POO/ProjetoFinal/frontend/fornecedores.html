<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fornecedores - Armazém</title>
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/fornecedores.css" />
  </head>
  <body>
    <div class="container">
      <nav class="navbar">
        <div class="navbar-brand">
          <h1>Armazém</h1>
        </div>
        <ul class="navbar-menu">
          <li><a href="index.html">Dashboard</a></li>
          <li><a href="produtos.html">Produtos</a></li>
          <li><a href="fornecedores.html" class="active">Fornecedores</a></li>
          <li><a href="clientes.html">Clientes</a></li>
          <li><a href="movimentacoes.html">Movimentações</a></li>
          <li><a href="caixa.html">Caixa</a></li>
          <li><a href="vendas.html">Histórico de Vendas</a></li>
        </ul>
      </nav>

      <main class="main-content">
        <div class="page-header">
          <h2>Gestão de Fornecedores</h2>
        </div>

        <div class="card" style="margin-bottom: 30px">
          <h3 style="margin-bottom: 20px">Cadastrar / Editar Fornecedor</h3>
          <form id="formFornecedor">
            <div
              style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px"
            >
              <div class="form-group">
                <label for="nomeFornecedor">Razão Social / Nome</label>
                <input
                  type="text"
                  id="nomeFornecedor"
                  placeholder="Nome do Fornecedor"
                  required
                />
              </div>
              <div class="form-group">
                <label for="cnpjFornecedor">CNPJ</label>
                <input
                  type="text"
                  id="cnpjFornecedor"
                  placeholder="00.000.000/0000-00"
                  required
                />
              </div>
            </div>

            <div
              style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px"
            >
              <div class="form-group">
                <label for="telefoneFornecedor">Telefone</label>
                <input
                  type="text"
                  id="telefoneFornecedor"
                  placeholder="(00) 00000-0000"
                />
              </div>
              <div class="form-group">
                <label for="emailFornecedor">E-mail</label>
                <input
                  type="email"
                  id="emailFornecedor"
                  placeholder="contato@empresa.com"
                />
              </div>
            </div>

            <div class="form-group">
              <label for="enderecoFornecedor">Endereço Completo</label>
              <input
                type="text"
                id="enderecoFornecedor"
                placeholder="Rua, Número, Bairro, Cidade - UF"
              />
            </div>

            <button type="submit" class="btn btn-primary">
              Salvar Fornecedor
            </button>
          </form>
        </div>

        <div class="table-container">
          <table id="tabelaFornecedores" class="table">
            <thead>
              <tr>
                <th>ID</th>
                <th>Nome</th>
                <th>CNPJ</th>
                <th>Telefone</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </main>
    </div>

    <script src="js/fornecedores.js"></script>
    <script src="js/authGuard.js"></script>
  </body>
</html>
