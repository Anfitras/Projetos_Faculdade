<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Movimentações - Armazém</title>
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/movimentacoes.css" />
  </head>
  <body>
    <div class="container">
      <nav class="navbar">
        <div class="navbar-brand">
          <h1>Armazém</h1>
        </div>
        <ul class="navbar-menu">
          <li><a href="index.html">Dashboard</a></li>
          <li><a href="produtos.html">Produtos</a></li>
          <li><a href="fornecedores.html">Fornecedores</a></li>
          <li><a href="clientes.html">Clientes</a></li>
          <li><a href="movimentacoes.html" class="active">Movimentações</a></li>
          <li><a href="caixa.html">Caixa</a></li>
          <li><a href="vendas.html">Histórico de Vendas</a></li>
        </ul>
      </nav>

      <main class="main-content">
        <div class="page-header">
          <h2>Controle de Estoque (Entradas e Saídas)</h2>
        </div>

        <div class="card" style="margin-bottom: 30px">
          <h3 style="margin-bottom: 20px">Registrar Nova Movimentação</h3>
          <form id="formMovimento">
            <div
              style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px"
            >
              <div class="form-group">
                <label for="produtoMovimento">Produto</label>
                <select id="produtoMovimento" required>
                  <option value="">Selecione um Produto</option>
                </select>
              </div>
              <div class="form-group">
                <label for="tipoMovimento">Tipo de Operação</label>
                <select id="tipoMovimento" required>
                  <option value="ENTRADA">Entrada (+)</option>
                  <option value="SAIDA">Saída (-)</option>
                </select>
              </div>
            </div>

            <div
              style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px"
            >
              <div class="form-group">
                <label for="quantidadeMovimento">Quantidade</label>
                <input
                  type="number"
                  id="quantidadeMovimento"
                  placeholder="1"
                  min="1"
                  required
                />
              </div>
              <div class="form-group">
                <label for="loteMovimento">Lote / Identificação</label>
                <input
                  type="text"
                  id="loteMovimento"
                  placeholder="Ex: LOTE-2026-A"
                />
              </div>
            </div>

            <div
              style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px"
            >
              <div class="form-group">
                <label for="validadeMovimento">Data de Validade</label>
                <input type="date" id="validadeMovimento" />
              </div>
              <div class="form-group">
                <label for="observacaoMovimento">Motivo / Observação</label>
                <input
                  type="text"
                  id="observacaoMovimento"
                  placeholder="Ex: Compra do fornecedor, descarte"
                />
              </div>
            </div>

            <button type="submit" class="btn btn-primary">
              Registrar Movimentação
            </button>
          </form>
        </div>

        <div class="table-container">
          <table id="tabelaMovimentos" class="table">
            <thead>
              <tr>
                <th>ID</th>
                <th>Produto</th>
                <th>Tipo</th>
                <th>Qtd</th>
                <th>Lote</th>
                <th>Validade</th>
                <th>Data Registro</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </main>
    </div>

    <script src="js/movimentacoes.js"></script>
    <script src="js/authGuard.js"></script>
  </body>
</html>
