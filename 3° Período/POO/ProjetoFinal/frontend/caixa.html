<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Frente de Caixa (PDV) - Armazém</title>
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/caixa.css" />
  </head>
  <body>
    <div class="container">
      <nav class="navbar">
        <div class="navbar-brand">
          <h1>Armazém</h1>
        </div>
        <ul class="navbar-menu">
          <li><a href="index.html">Dashboard</a></li>
          <li><a href="produtos.html">Produtos</a></li>
          <li><a href="fornecedores.html">Fornecedores</a></li>
          <li><a href="clientes.html">Clientes</a></li>
          <li><a href="movimentacoes.html">Movimentações</a></li>
          <li><a href="caixa.html" class="active">Caixa</a></li>
          <li><a href="vendas.html">Histórico de Vendas</a></li>
        </ul>
      </nav>

      <main class="main-content">
        <div class="page-header">
          <h2>Frente de Caixa (Ponto de Venda)</h2>
        </div>

        <div style="display: grid; grid-template-columns: 3fr 2fr; gap: 20px">
          <div>
            <div class="card" style="margin-bottom: 20px">
              <h3 style="margin-bottom: 15px">Inserir Produto</h3>
              <form id="formAdicionarItem">
                <div
                  style="
                    display: grid;
                    grid-template-columns: 3fr 1fr;
                    gap: 10px;
                  "
                >
                  <div class="form-group" style="margin: 0">
                    <select id="produtoCaixa" required>
                      <option value="">Selecione um Produto</option>
                    </select>
                  </div>
                  <div class="form-group" style="margin: 0">
                    <input
                      type="number"
                      id="quantidadeCaixa"
                      placeholder="Qtd"
                      min="1"
                      value="1"
                      required
                    />
                  </div>
                </div>
                <button
                  type="submit"
                  class="btn btn-primary"
                  style="margin-top: 15px; width: 100%"
                >
                  Adicionar ao Carrinho
                </button>
              </form>
            </div>

            <div class="card">
              <h3 style="margin-bottom: 15px">Itens da Venda Atual</h3>
              <table id="tabelaCarrinho" class="table">
                <thead>
                  <tr>
                    <th>Produto</th>
                    <th>Preço Unit.</th>
                    <th>Qtd</th>
                    <th>Subtotal</th>
                    <th>Ação</th>
                  </tr>
                </thead>
                <tbody></tbody>
              </table>
            </div>
          </div>

          <div>
            <div class="card">
              <h3>Resumo da Venda</h3>
              <div class="form-group">
                <label>Cliente</label>
                <div style="display: flex; gap: 8px">
                  <select id="clienteCaixa">
                    <option value="">Consumidor Final (Padrão)</option>
                  </select>
                  <button
                    type="button"
                    id="btnAbrirModalCliente"
                    class="btn btn-secondary"
                  >
                    +
                  </button>
                </div>
              </div>

              <div class="form-group">
                <label>Forma de Pagamento</label>
                <select id="formaPagamentoCaixa">
                  <option value="DINHEIRO">Dinheiro</option>
                  <option value="CARTAO_DEBITO">Cartão de Débito</option>
                  <option value="CARTAO_CREDITO">Cartão de Crédito</option>
                  <option value="PIX">PIX</option>
                </select>
              </div>

              <div class="form-group">
                <label>Desconto Aplicado (R$)</label>
                <input
                  type="number"
                  id="descontoCaixa"
                  placeholder="0.00"
                  step="0.01"
                  value="0"
                />
              </div>

              <div
                style="
                  margin-top: 25px;
                  padding-top: 15px;
                  border-top: 2px dashed var(--border-color);
                "
              >
                <div style="font-size: 14px; color: var(--text-light)">
                  Total a Pagar
                </div>
                <div
                  id="totalCarrinho"
                  style="
                    font-size: 32px;
                    color: var(--success-color);
                    font-weight: bold;
                  "
                >
                  R$ 0,00
                </div>
              </div>

              <button
                type="button"
                id="btnFinalizarVenda"
                class="btn btn-primary"
                style="
                  width: 100%;
                  margin-top: 20px;
                  padding: 15px;
                  font-size: 18px;
                  background-color: var(--success-color);
                "
              >
                Concluir Venda
              </button>
            </div>
          </div>
        </div>

        <dialog
          id="modalNovoCliente"
          class="modal-content"
          style="border: none; margin: auto"
        >
          <h3 style="margin-bottom: 20px">Cadastrar Cliente Rápido</h3>
          <form id="formModalCliente">
            <div class="form-group">
              <label>Nome Completo</label>
              <input type="text" id="modalNomeCliente" required />
            </div>
            <div class="form-group">
              <label>CPF</label>
              <input type="text" id="modalCpfCliente" required />
            </div>
            <div class="form-group">
              <label>Telefone</label>
              <input type="text" id="modalTelefoneCliente" />
            </div>
            <div class="form-group">
              <label>E-mail</label>
              <input type="email" id="modalEmailCliente" />
            </div>
            <div
              style="
                display: flex;
                justify-content: flex-end;
                gap: 10px;
                margin-top: 20px;
              "
            >
              <button
                type="button"
                id="btnFecharModal"
                class="btn btn-secondary"
              >
                Cancelar
              </button>
              <button type="submit" class="btn btn-primary">
                Salvar Cliente
              </button>
            </div>
          </form>
        </dialog>
      </main>
    </div>

    <script src="js/caixa.js"></script>
    <script src="js/authGuard.js"></script>
  </body>
</html>
