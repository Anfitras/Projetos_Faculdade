<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Produtos - Armazém</title>
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/produtos.css" />
  </head>
  <body>
    <div class="container">
      <nav class="navbar">
        <div class="navbar-brand">
          <h1>Armazém</h1>
        </div>
        <ul class="navbar-menu">
          <li><a href="index.html">Dashboard</a></li>
          <li><a href="produtos.html" class="active">Produtos</a></li>
          <li><a href="fornecedores.html">Fornecedores</a></li>
          <li><a href="clientes.html">Clientes</a></li>
          <li><a href="movimentacoes.html">Movimentações</a></li>
          <li><a href="caixa.html">Caixa</a></li>
          <li><a href="vendas.html">Histórico de Vendas</a></li>
        </ul>
      </nav>

      <main class="main-content">
        <div class="page-header">
          <h2>Gestão de Produtos</h2>
        </div>

        <div class="card" style="margin-bottom: 30px">
          <h3 style="margin-bottom: 20px">Cadastrar / Editar Produto</h3>
          <form id="formProduto">
            <div
              style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px"
            >
              <div class="form-group">
                <label for="nomeProduto">Nome</label>
                <input
                  type="text"
                  id="nomeProduto"
                  placeholder="Nome do Produto"
                  required
                />
              </div>
              <div class="form-group">
                <label for="categoriaProduto">Categoria</label>
                <input
                  type="text"
                  id="categoriaProduto"
                  placeholder="Categoria do Produto"
                  required
                />
              </div>
            </div>

            <div
              style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px"
            >
              <div class="form-group">
                <label for="precoCustoProduto">Preço de Custo (R$)</label>
                <input
                  type="number"
                  id="precoCustoProduto"
                  placeholder="0.00"
                  step="0.01"
                  required
                />
              </div>
              <div class="form-group">
                <label for="precoVendaProduto">Preço de Venda (R$)</label>
                <input
                  type="number"
                  id="precoVendaProduto"
                  placeholder="0.00"
                  step="0.01"
                  required
                />
              </div>
            </div>

            <div class="form-group">
              <label for="fornecedorSelect">Fornecedor</label>
              <select id="fornecedorSelect" required>
                <option value="">Carregando fornecedores...</option>
              </select>
            </div>

            <button type="submit" class="btn btn-primary">
              Salvar Produto
            </button>
          </form>
        </div>

        <div class="table-container">
          <table id="tabelaProdutos" class="table">
            <thead>
              <tr>
                <th>ID</th>
                <th>Nome</th>
                <th>Categoria</th>
                <th>Custo</th>
                <th>Venda</th>
                <th>Estoque</th>
                <th>Fornecedor</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </main>
    </div>

    <script src="js/produtos.js"></script>
    <script src="js/authGuard.js"></script>
  </body>
</html>
